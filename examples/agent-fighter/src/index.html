<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenController Agent Fighter</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #181713;
        color: #f6f0df;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      canvas {
        width: min(100vw, 1280px);
        height: auto;
        max-height: 100vh;
        aspect-ratio: 16 / 9;
        display: block;
        background: #24221d;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="1280" height="720"></canvas>
    <script type="module" src="/client.js"></script>
  </body>
</html>
