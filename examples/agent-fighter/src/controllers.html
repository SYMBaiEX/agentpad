<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentPad Controllers</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f4efe4;
        --muted: #a7adac;
        --panel: #202521;
        --panel-2: #171b18;
        --line: #394139;
        --red: #dc4d4d;
        --blue: #4d82dc;
        --active: #f6c15f;
        --trigger: #72c3a3;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #111410;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        padding: 24px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin: 0 auto 18px;
        max-width: 1320px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
      }

      .arena {
        color: var(--muted);
        font-size: 14px;
        text-align: right;
      }

      .management {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      .status {
        min-width: 260px;
        color: var(--muted);
        font-size: 13px;
        text-align: right;
        margin-top: 8px;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #242b25;
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        font-weight: 750;
        padding: 9px 12px;
        cursor: pointer;
      }

      button:hover:not(:disabled) {
        border-color: var(--active);
      }

      button:disabled {
        color: #686f69;
        cursor: default;
      }

      .start {
        background: #1f392d;
      }

      .stop {
        background: #3a2424;
      }

      main {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        max-width: 1320px;
        margin: 0 auto;
      }

      .agent {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .agentHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        background: #151916;
        border-bottom: 1px solid var(--line);
      }

      .agentName {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 750;
      }

      .swatch {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
      }

      .body {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      .controller {
        display: grid;
        grid-template-columns: 1fr 1.5fr 1fr;
        gap: 14px;
        align-items: center;
        min-height: 190px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
      }

      .stick {
        width: 98px;
        height: 98px;
        border: 2px solid #4a554c;
        border-radius: 50%;
        position: relative;
        background: #0f130f;
        justify-self: center;
      }

      .nub {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--muted);
        position: absolute;
        left: 31px;
        top: 31px;
        transform: translate(var(--x, 0px), var(--y, 0px));
      }

      .padMid {
        display: grid;
        gap: 12px;
      }

      .triggers {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .trigger {
        height: 10px;
        border-radius: 5px;
        background: #303831;
        overflow: hidden;
      }

      .trigger span {
        display: block;
        height: 100%;
        width: calc(var(--value, 0) * 100%);
        background: var(--trigger);
      }

      .dpad,
      .buttons {
        display: grid;
        grid-template-columns: repeat(3, 34px);
        grid-template-rows: repeat(3, 34px);
        gap: 6px;
        justify-content: center;
      }

      .button,
      .dir {
        display: grid;
        place-items: center;
        min-width: 34px;
        min-height: 34px;
        border-radius: 50%;
        background: #303831;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .button.active,
      .dir.active {
        background: var(--active);
        color: #1b1406;
      }

      .dpad .up {
        grid-column: 2;
      }

      .dpad .left {
        grid-column: 1;
        grid-row: 2;
      }

      .dpad .right {
        grid-column: 3;
        grid-row: 2;
      }

      .dpad .down {
        grid-column: 2;
        grid-row: 3;
      }

      .buttons .y {
        grid-column: 2;
      }

      .buttons .x {
        grid-column: 1;
        grid-row: 2;
      }

      .buttons .b {
        grid-column: 3;
        grid-row: 2;
      }

      .buttons .a {
        grid-column: 2;
        grid-row: 3;
      }

      .decision {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #171b18;
      }

      .decision strong {
        color: var(--active);
      }

      .logs {
        height: 330px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #10130f;
      }

      .log {
        padding: 12px;
        border-bottom: 1px solid #293029;
      }

      .log:last-child {
        border-bottom: 0;
      }

      .logTop {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .logAction {
        margin: 6px 0;
        font-weight: 750;
      }

      .rationale {
        margin: 0;
        color: #d9ddd2;
        line-height: 1.35;
      }

      .controls {
        margin-top: 8px;
        color: var(--muted);
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      @media (max-width: 920px) {
        body {
          padding: 14px;
        }

        header,
        main {
          grid-template-columns: 1fr;
        }

        main {
          display: grid;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .management {
          justify-content: flex-start;
        }

        .controller {
          grid-template-columns: 1fr;
        }

        .status,
        .arena {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>AgentPad Controllers</h1>
        <div class="meta">Live controller state, decisions, and telemetry</div>
      </div>
      <div>
        <div class="management">
          <button id="startAgents" class="start" type="button">
            Start Agents
          </button>
          <button id="stopAgents" class="stop" type="button">
            Stop Agents
          </button>
          <button id="resetDuel" type="button">Reset Duel</button>
        </div>
        <div id="status" class="status"></div>
        <div id="arena" class="arena"></div>
      </div>
    </header>
    <main>
      <section id="player-1" class="agent"></section>
      <section id="player-2" class="agent"></section>
    </main>
    <script type="module" src="/controller-panel.js"></script>
  </body>
</html>
