name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: |
          node --input-type=module <<'EOF'
          import {
            NativeProcessBridgeAdapter,
            createController
          } from "./packages/core/dist/index.js";
          import {
            createNativeHostBridgeAdapter,
            defaultNativeHostBridgePath,
            resolveNativeHostBridgeBackend
          } from "./packages/native/dist/index.js";
          import {
            createLinuxUinputBridgeAdapter,
            formatLinuxUinputSetupPlan,
            defaultLinuxUinputHelperPath
          } from "./packages/native-linux-uinput/dist/index.js";
          import {
            createWindowsVhfHostBridgeAdapter,
            defaultWindowsVhfHostBridgePath
          } from "./packages/native-windows-virtual-gamepad/dist/index.js";
          import {
            createMacosDriverKitHostBridgeAdapter,
            defaultMacosDriverKitHostBridgePath
          } from "./packages/native-macos-driverkit/dist/index.js";

          if (typeof createLinuxUinputBridgeAdapter !== "function") {
            throw new Error("Linux uinput adapter factory is not exported");
          }
          if (!defaultLinuxUinputHelperPath("/tmp/home").endsWith("opencontroller-uinput-bridge")) {
            throw new Error("Linux uinput helper path export is invalid");
          }
          if (!formatLinuxUinputSetupPlan({
            platform: "linux",
            helperPath: "/tmp/opencontroller-uinput-bridge",
            udevRules: [],
            doctorCommand: "opencontroller-linux-uinput-doctor --check",
            dryRunCommand: "opencontroller bridge --id player-1 | /tmp/opencontroller-uinput-bridge --dry-run",
            bridgeCommand: "opencontroller bridge --id player-1 | /tmp/opencontroller-uinput-bridge"
          }).includes("No privileged system changes were made.")) {
            throw new Error("Linux uinput setup formatter is invalid");
          }
          if (typeof createWindowsVhfHostBridgeAdapter !== "function") {
            throw new Error("Windows VHF host bridge adapter factory is not exported");
          }
          if (!defaultWindowsVhfHostBridgePath("C:\\Users\\ci\\AppData\\Local").endsWith("OpenControllerVhfHostBridge.exe")) {
            throw new Error("Windows VHF host bridge path export is invalid");
          }
          if (typeof createMacosDriverKitHostBridgeAdapter !== "function") {
            throw new Error("macOS DriverKit host bridge adapter factory is not exported");
          }
          if (!defaultMacosDriverKitHostBridgePath("/Users/ci/Library/Application Support").endsWith("OpenControllerDriverKitHostBridge")) {
            throw new Error("macOS DriverKit host bridge path export is invalid");
          }
          if (typeof createNativeHostBridgeAdapter !== "function") {
            throw new Error("Unified native host bridge adapter factory is not exported");
          }
          if (resolveNativeHostBridgeBackend({ platform: "linux" }) !== "linux-uinput") {
            throw new Error("Unified native backend resolver did not select Linux");
          }
          if (!defaultNativeHostBridgePath({ backend: "macos-driverkit" }).endsWith("OpenControllerDriverKitHostBridge")) {
            throw new Error("Unified native host bridge path export is invalid");
          }

          let stdout = "";
          const adapter = new NativeProcessBridgeAdapter({
            command: "/bin/cat",
            waitForExitMs: 500,
            onStdout(chunk) {
              stdout += chunk;
            }
          });
          const controller = await createController({
            id: "node-ci",
            profile: "xbox",
            adapter,
            replay: false
          });
          await controller.press("A", 1);
          await controller.disconnect();
          await new Promise((resolve) => setTimeout(resolve, 20));

          if (!stdout.includes("hidReportBase64")) {
            throw new Error("Node native process smoke did not emit HID reports");
          }
          if (!stdout.includes("opencontroller.bridge.disconnect")) {
            throw new Error("Node native process smoke did not emit disconnect");
          }
          EOF
      - run: cc -fsyntax-only -Wall -Wextra packages/native-linux-uinput/src/helper/opencontroller-uinput-bridge.c
      - run: cc -O2 -Wall -Wextra -o /tmp/opencontroller-uinput-bridge packages/native-linux-uinput/src/helper/opencontroller-uinput-bridge.c
      - run: |
          bun packages/native-windows-virtual-gamepad/dist/bin/setup.js \
            --output /tmp/opencontroller-windows-vhf \
            --host-bridge-path "C:\OpenController\bin\OpenControllerVhfHostBridge.exe" \
            --json |
            tee /tmp/opencontroller-windows-vhf-setup.json
          grep -q "OpenControllerVhfGamepad.inf" /tmp/opencontroller-windows-vhf-setup.json
          test -f /tmp/opencontroller-windows-vhf/driver/OpenControllerVhfGamepad.inf
          test -f /tmp/opencontroller-windows-vhf/host-bridge/OpenControllerVhfHostBridge.c
          grep -q "No privileged system changes were made" /tmp/opencontroller-windows-vhf/README.md
          grep -q "DeviceIoControl" /tmp/opencontroller-windows-vhf/host-bridge/OpenControllerVhfHostBridge.c
      - run: |
          bun packages/native-macos-driverkit/dist/bin/setup.js \
            --output /tmp/opencontroller-macos-driverkit \
            --driver-bundle-id com.example.opencontroller.driver \
            --driver-class-name ExampleOpenControllerDriver \
            --json |
            tee /tmp/opencontroller-macos-driverkit-setup.json
          grep -q "com.example.opencontroller.driver" /tmp/opencontroller-macos-driverkit-setup.json
          test -f /tmp/opencontroller-macos-driverkit/driverkit-extension/Info.plist
          test -f /tmp/opencontroller-macos-driverkit/driverkit-extension/OpenControllerVirtualGamepadDriver.cpp
          test -f /tmp/opencontroller-macos-driverkit/host-app/OpenControllerHost.entitlements
          grep -q "No privileged system changes were made" /tmp/opencontroller-macos-driverkit/README.md
          grep -q "System Extension activation" /tmp/opencontroller-macos-driverkit/README.md
      - run: |
          bun packages/native-linux-uinput/dist/bin/setup.js \
            --output /tmp/opencontroller-uinput-bridge-setup \
            --json |
            tee /tmp/opencontroller-uinput-setup.json
          grep -q '"helperPath": "/tmp/opencontroller-uinput-bridge-setup"' /tmp/opencontroller-uinput-setup.json
          grep -q '"doctorCommand": "opencontroller-linux-uinput-doctor --check"' /tmp/opencontroller-uinput-setup.json
          test -x /tmp/opencontroller-uinput-bridge-setup
      - run: |
          bun packages/cli/dist/index.js bridge --id ci |
            /tmp/opencontroller-uinput-bridge --dry-run |
            tee /tmp/opencontroller-uinput-dry-run.txt
          printf '%s\n' '{"hidReportBase64":"AQAEAAAAAAAAAAAAAA=="}' |
            /tmp/opencontroller-uinput-bridge --dry-run |
            tee /tmp/opencontroller-uinput-home-dry-run.txt
          grep -q "state buttons=0x1000" /tmp/opencontroller-uinput-dry-run.txt
          grep -q "state buttons=0x0000 lt=0 rt=128 lx=0 ly=0 rx=0 ry=0" /tmp/opencontroller-uinput-dry-run.txt
          grep -q "disconnect buttons=0x0000" /tmp/opencontroller-uinput-dry-run.txt
          grep -q "state buttons=0x0400" /tmp/opencontroller-uinput-home-dry-run.txt
